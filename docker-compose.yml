version: "3.8"

services:
  app:
    build: .
    ports:
      - "3020:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Ensure Prisma knows how to connect to the DB within the docker network
      DATABASE_URL: postgresql://postgres:root@db:5432/kanban_board?schema=public

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: kanban_board
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kanban_board"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
