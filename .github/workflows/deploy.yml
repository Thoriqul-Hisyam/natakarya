name: Deploy to aaPanel

on:
  push:
    branches:
      - main  # Ganti jika branch utama kamu bukan main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kanban-board:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 2255
          script: |
            cd /www/wwwroot/kanban-board || mkdir -p /www/wwwroot/kanban-board && cd /www/wwwroot/kanban-board
            
            # Buat docker-compose.yml khusus di server jika belum ada
            cat <<EOF > docker-compose.yml
            version: "3.8"
            services:
              app:
                image: ${{ secrets.DOCKER_USERNAME }}/kanban-board:latest
                ports:
                  - "3020:3020"
                restart: always
                environment:
                  DATABASE_URL: "${{ secrets.DATABASE_URL }}"
                  AUTH_SECRET: "${{ secrets.AUTH_SECRET }}"
                  AUTH_URL: "${{ secrets.AUTH_URL }}"
                  AUTH_TRUST_HOST: "${{ secrets.AUTH_TRUST_HOST }}"
                  GOOGLE_CLIENT_ID: "${{ secrets.GOOGLE_CLIENT_ID }}"
                  GOOGLE_CLIENT_SECRET: "${{ secrets.GOOGLE_CLIENT_SECRET }}"
                  PUSHER_APP_ID: "${{ secrets.PUSHER_APP_ID }}"
                  PUSHER_KEY: "${{ secrets.PUSHER_KEY }}"
                  PUSHER_SECRET: "${{ secrets.PUSHER_SECRET }}"
                  PUSHER_CLUSTER: "${{ secrets.PUSHER_CLUSTER }}"
                  NEXT_PUBLIC_PUSHER_KEY: "${{ secrets.NEXT_PUBLIC_PUSHER_KEY }}"
                  NEXT_PUBLIC_PUSHER_CLUSTER: "${{ secrets.NEXT_PUBLIC_PUSHER_CLUSTER }}"
              db:
                image: postgres:15
                restart: always
                environment:
                  POSTGRES_USER: postgres
                  POSTGRES_PASSWORD: root
                  POSTGRES_DB: kanban_board
                volumes:
                  - postgres_data:/var/lib/postgresql/data
            volumes:
              postgres_data:
            EOF

            docker compose pull
            docker compose down
            docker compose up -d
            docker image prune -f
